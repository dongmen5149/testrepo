; Hero5 (영웅서기5) Godot 4 Android export configuration.
; Round 86 (2026-05-19): Distribution build preset 작성.
;
; 2 preset: Debug (자동 keystore signing, 개발/QA) + Release (수동 keystore signing,
; Store 배포). Editor 가 자동 keystore 생성하므로 Debug 는 추가 설정 불필요.
;
; 빌드 절차: docs/h5/BUILD_ANDROID.md 참조.
;   1. Project → Install Android Build Template (Editor 가 android/build/ 생성)
;   2. Editor Settings → Export → Android → JDK 17 + Android SDK + NDK 경로 지정
;   3. Project → Export → Add → "Android (Debug)" 선택 → Export Project → APK
;   4. (Release) Editor Settings → Android keystore 설정 → "Android (Release)" → APK
;
; Target: targetSdk 34 (Android 14), minSdk 23 (Android 6.0) — 모던 폰 광범위 지원
; Architecture: arm64-v8a 만 (32-bit 폰 미지원, 디버그 size 절감)

[preset.0]

name="Android (Debug)"
platform="Android"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../../build/Hero5-debug.apk"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

