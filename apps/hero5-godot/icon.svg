<?xml version="1.0" encoding="UTF-8"?>
<!--
Hero5 (영웅서기5) icon — Round 86.
Project.godot 의 res://icon.svg 참조 (이전엔 missing). 단순 검 + 별 디자인.
실 출시 icon 은 사용자 환경에서 launcher_icons 으로 별도 교체 (export_presets §
launcher_icons/main_192x192).
-->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" fill="#1a1a2e"/>
  <circle cx="64" cy="64" r="56" fill="#2d2d5f" stroke="#e8c468" stroke-width="3"/>
  <!-- Sword (vertical) -->
  <rect x="60" y="20" width="8" height="68" fill="#c0c0d0"/>
  <rect x="50" y="86" width="28" height="6" fill="#8b5a2b"/>
  <rect x="62" y="90" width="4" height="18" fill="#6b3e1c"/>
  <polygon points="64,12 60,22 68,22" fill="#e8c468"/>
  <!-- Star (top right) -->
  <polygon points="92,32 95,40 103,40 97,46 99,54 92,49 85,54 87,46 81,40 89,40"
           fill="#e8c468" stroke="#c89a3a" stroke-width="1"/>
  <!-- "5" text -->
  <text x="64" y="118" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle" fill="#e8c468">HERO 5</text>
</svg>
